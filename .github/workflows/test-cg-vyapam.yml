name: CG Vyapam Recruitment Diagnostic test

on:
  workflow_dispatch:

jobs:
  diagnostic-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Live CG Vyapam Crawler
        run: npm run test:vyapam

      - name: Upload Diagnostic JSON Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cg-vyapam-diagnostic-result
          path: dist/diagnostic-result.json
          if-no-files-found: warn
